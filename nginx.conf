server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker internal DNS with long timeout for stability under load
    resolver 127.0.0.11 valid=300s;
    resolver_timeout 10s;

    root /usr/share/nginx/html;
    index index.html;

    # Highly optimized Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Timeouts for stability (avoid 504 Gateway Timeout)
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # Serve static files from the root
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests - Robust version
    location /api/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Extended timeouts for backend responses
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings to handle large responses efficiently
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
    }

    # Proxy storage requests
    location /order_attachments/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
    }

    location /payment_receipts/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
    }

    location /delivery_proofs/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
    }

    location /health {
        access_log off;
        return 200 'OK';
    }
}
