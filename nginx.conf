server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Docker internal DNS
    resolver 127.0.0.11 valid=30s;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Serve static files from the root
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests - Robust version (won't crash if backend is down)
    location /api/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy storage requests
    location /order_attachments/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
    }

    location /payment_receipts/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
    }

    location /delivery_proofs/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream$request_uri;
    }

    location /health {
        access_log off;
        return 200 'OK';
    }
}
