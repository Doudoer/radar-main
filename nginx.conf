server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Root directory pointing to the base path folder
    # This matches vite's base: '/radar/'
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location /radar/ {
        # This will look for files in /usr/share/nginx/html/radar/
        try_files $uri $uri/ /radar/index.html;
    }

    # Proxy API requests - Using direct hostname for Dokploy/Docker networks
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirect root to /radar/
    location = / {
        return 301 /radar/;
    }

    # Health check for Dokploy/Traefik
    location /health {
        access_log off;
        return 200 'OK';
    }
}
