server {
    listen 80;
    server_name _;

    # Docker internal DNS (helps Nginx not crash if backend is slow to start)
    resolver 127.0.0.11 valid=30s;

    # Static files for the frontend
    location /radar/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /radar/index.html;
    }

    # Proxy API requests to the backend
    location /api/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy storage requests to the backend
    location /radar/order_attachments/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
    }

    location /radar/payment_receipts/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
    }

    location /radar/delivery_proofs/ {
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream;
    }

    # Fallback to redirect root to /radar/
    location = / {
        return 301 /radar/;
    }
}
